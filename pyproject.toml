[build-system]
requires = ["hatchling>=1.18.0"]
build-backend = "hatchling.build"

[project]
name = "alpha-node-api"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "fastapi[standard]>=0.115.0",
    "sqlmodel>=0.0.22",
    "uvicorn>=0.32.0",
]

[dependency-groups]
dev = []

[tool.hatch.build.targets.wheel]
packages = ["hub"]

